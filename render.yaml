services:
  - type: web
    name: walery
    env: python
    plan: free
    runtime: python-3.11
    healthCheckPath: /health/
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py check --deploy
      python manage.py collectstatic --noinput --clear
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --workers 1 --timeout 120 --graceful-timeout 30 --keep-alive 5 --log-file -
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "walery.onrender.com,walery.site"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://walery.onrender.com,https://walery.site"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://walery.onrender.com,https://walery.site"
      - key: DJANGO_SECRET_KEY
        generateValue: true
