{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Kmotr" />
  <meta name="theme-color" content="#0f1117" />
  <meta property="og:title" content="Walery | Portfolio" />
  <meta property="og:description" content="Portfolio of Walery — Developer, Engineer, Analyst." />
  <meta property="og:type" content="website" />
  <title>{% block title %}Walery | Portfolio{% endblock %}</title>
  <meta name="description" content="Walery — engineer, programmer & creative mind. Web automation, analysis and custom tooling.">
  <link rel="icon" href="{% static 'core/img/favicon.ico' %}" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <link rel="canonical" href="https://walery.onrender.com" />
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>
<h1 class="visually-hidden">Walery – Portfolio</h1>
<div id="loader">
  <div class="spinner-border text-primary" role="status"></div>
</div>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container d-flex align-items-center justify-content-between">

    <!-- LEFT: Walery -->
    <a class="navbar-brand fw-bold mb-0" href="/">Walery</a>

    <!-- BURGER (mobile) -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- CENTER: EN/PL (MOBILE) -->
    <div class="lang-switcher d-lg-none d-flex justify-content-center mx-auto my-0">
      <button class="btn btn-sm btn-outline-secondary me-1 lang-btn" data-lang="en" aria-pressed="false">EN</button>
      <button class="btn btn-sm btn-outline-secondary lang-btn" data-lang="pl" aria-pressed="false">PL</button>
    </div>

    <!-- NAVIGATION -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto w-100" id="navbarScrollSpy">
        <li class="nav-item"><a class="nav-link" href="/#about" data-en="About" data-pl="O mnie">About</a></li>
        <li class="nav-item"><a class="nav-link" href="/#services" data-en="What I Offer" data-pl="Oferta">What I Offer</a></li>
        <li class="nav-item"><a class="nav-link" href="/#projects" data-en="Projects" data-pl="Projekty">Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="/#contact" data-en="Contact" data-pl="Kontakt">Contact</a></li>

        <!-- separator desktop -->
        <li class="nav-item d-none d-lg-flex align-items-center px-2 text-muted">||</li>

        <!-- separator mobile -->
        <li class="nav-item d-lg-none">
          <hr class="my-2" />
        </li>

        <!-- extra links smaller -->
        <li class="nav-item"><a class="nav-link small" href="/gallery/" data-en="Gallery" data-pl="Galeria">Gallery</a></li>
        <li class="nav-item"><a class="nav-link small" href="/tonguetwister/" data-en="Lingwołamki" data-pl="Lingwołamki">Lingwołamki</a></li>
        <li class="nav-item"><a class="nav-link small" href="/rugby/" data-en="AFC Rugby" data-pl="AFC Rugby">AFC Rugby</a></li>
        <li class="nav-item"><a class="nav-link small" href="/docdiff/" data-en="DocDiff" data-pl="DocDiff">DocDiff</a></li>
      </ul>

      <!-- DESKTOP: LANG -->
      <div class="lang-switcher d-none d-lg-flex align-items-center ms-3 gap-2">
        <button class="btn btn-sm btn-outline-secondary lang-btn" data-lang="en" aria-pressed="false">EN</button>
        <button class="btn btn-sm btn-outline-secondary lang-btn" data-lang="pl" aria-pressed="false">PL</button>
      </div>
    </div>
  </div>
</nav>

<main class="py-5" style="padding-top: 80px;">
  {% block content %}{% endblock %}
</main>

<div id="contact-messages" class="d-none">
  <span id="msg-success" data-en="Your message has been sent successfully!" data-pl="Twoja wiadomość została wysłana pomyślnie!"></span>
  <span id="msg-invalid" data-en="Invalid response from server." data-pl="Nieprawidłowa odpowiedź serwera."></span>
  <span id="msg-error" data-en="Server error. Please try later." data-pl="Błąd serwera. Spróbuj ponownie później."></span>
  <span id="msg-fail" data-en="Something went wrong." data-pl="Coś poszło nie tak."></span>
</div>

{% include 'core/footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="{% static 'core/js/lang.js' %}" defer></script>
<script src="{% static 'core/js/nav.js' %}" defer></script>
<script src="{% static 'core/js/navbar.js' %}" defer></script>
<script src="{% static 'core/js/matrix.js' %}" defer></script>
<script src="{% static 'core/js/contact.js' %}" defer></script>
<script src="{% static 'core/js/main.js' %}" defer></script>
</body>
</html>
