{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 — Page not found</title>
  <link rel="icon" href="{% static 'core/img/favicon.ico' %}" type="image/x-icon" />
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Kaushan+Script&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ── 404 page ────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #c4922a;
      --dark:    #0f1117;
      --surface: #1a1e27;
      --light:   #e8e8e8;
      --muted:   #8a8f9a;
      --border:  rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--light);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .error-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem 3rem;
      position: relative;
      overflow: hidden;
    }

    /* Radial golden glow behind the number */
    .error-hero::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(196,146,42,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Canvas: falling chars ──────────────────────────────────────────── */
    #errorCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Content ─────────────────────────────────────────────────────────── */
    .error-content {
      position: relative;
      z-index: 1;
      max-width: 640px;
    }

    /* Big glitchy number */
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5.5rem, 18vw, 10rem);
      font-weight: 700;
      line-height: 1;
      color: var(--primary);
      letter-spacing: -0.02em;
      position: relative;
      display: inline-block;
      margin-bottom: 0.15em;

      /* CSS glitch via text-shadow */
      animation: glitch 4s infinite;
    }

    @keyframes glitch {
      0%,  92%, 100% { text-shadow: none; }
      93%  { text-shadow:  3px 0 0 rgba(255,60,60,0.6), -3px 0 0 rgba(60,200,255,0.6); }
      94%  { text-shadow: -4px 0 0 rgba(255,60,60,0.6),  4px 0 0 rgba(60,200,255,0.6); }
      95%  { text-shadow:  2px 0 0 rgba(255,60,60,0.6), -2px 0 0 rgba(60,200,255,0.6); }
      96%  { text-shadow: none; }
      97%  { text-shadow:  5px 0 0 rgba(255,60,60,0.5), -1px 0 0 rgba(60,200,255,0.5); }
      98%  { text-shadow: none; }
    }

    /* Decorative underline matching section h2::after */
    .error-code::after {
      content: '';
      display: block;
      width: 56px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), #e0b060);
      margin: 12px auto 0;
      border-radius: 2px;
    }

    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--light);
      margin: 1.2rem 0 1rem;
    }

    .error-tagline {
      font-family: 'Kaushan Script', cursive;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: var(--primary);
      margin-bottom: 1.4rem;
      display: block;
    }

    .error-msg {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 2.2rem;
    }

    .error-msg strong { color: var(--light); }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-error-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.6rem;
      background: #22273a;
      color: var(--light);
      border: none;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
    }

    .btn-error-home:hover {
      background: var(--primary);
      color: #fff;
    }

    .btn-error-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.6rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
      cursor: pointer;
    }

    .btn-error-back:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Footer (matches site footer) ───────────────────────────────────── */
    footer {
      background: #080a0f;
      color: rgba(255,255,255,0.65);
      text-align: center;
      padding: 28px 20px;
      border-top: 1px solid rgba(196,146,42,0.2);
      font-size: 0.891rem;
    }

    /* ── Fade-in on load ─────────────────────────────────────────────────── */
    .error-content {
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.6s ease 0.1s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <main class="error-hero" role="main">
    <canvas id="errorCanvas" aria-hidden="true"></canvas>

    <div class="error-content">
      <p class="error-code" aria-label="Error 404">404</p>

      <h1 class="error-title">Page not found</h1>
      <span class="error-tagline">Gdzieś między inżynierem a humanistą…</span>

      <p class="error-msg">
        Strona <strong>{{ request.path }}</strong> nie istnieje.<br>
        Może coś poszło nie tak, może adres się zmienił.<br>
        Wróć tam, gdzie chaos zamienia się w porządek.
      </p>

      <div class="error-actions">
        <a class="btn-error-home" href="{% url 'home' %}">
          <i class="fa-solid fa-house"></i> Strona główna
        </a>
        <button class="btn-error-back" onclick="history.back()">
          <i class="fa-solid fa-arrow-left"></i> Wróć
        </button>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 Walery — All rights reserved</p>
  </footer>
</div>

<script>
  /* Lightweight falling-chars canvas — matches the matrix canvas on index */
  (function () {
    const canvas = document.getElementById('errorCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>{}[]|\\/*+-=_~';
    const COLOR = '#c4922a';
    const FONT_SIZE = 14;
    let cols, drops;

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      cols  = Math.floor(canvas.width / FONT_SIZE);
      drops = Array.from({ length: cols }, () => Math.random() * -50);
    }

    function draw() {
      ctx.fillStyle = 'rgba(15, 17, 23, 0.04)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = COLOR;
      ctx.font = `${FONT_SIZE}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const char = CHARS[Math.floor(Math.random() * CHARS.length)];
        ctx.fillText(char, i * FONT_SIZE, drops[i] * FONT_SIZE);

        if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i] += 0.4;
      }
    }

    resize();
    window.addEventListener('resize', resize);
    setInterval(draw, 50);
  })();
</script>
</body>
</html>
